<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Poker Night</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #222;
    overflow-x: hidden; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-x: none;
    background: #0a0a0a;
  }
  body::before {
    content: ''; position: fixed;
    top: -50px; left: -50px; right: -50px; bottom: -50px; /* generous bleed for iOS bounce */
    background: url('images/PokerBackground.jpg') no-repeat center center;
    background-size: cover;
    z-index: 0;
  }
  body::after {
    content: ''; position: fixed;
    top: -50px; left: -50px; right: -50px; bottom: -50px;
    background: linear-gradient(160deg, rgba(0,0,0,.55) 0%, rgba(10,30,10,.50) 100%);
    z-index: 0;
  }
  body > * { position: relative; z-index: 1; }

  /* ===== Login ===== */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh;
    min-height: -webkit-fill-available; animation: fadeIn .6s ease;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    max-width: 100vw; overflow: hidden; }
  #login-box { text-align: center; padding: 2.5rem 2rem; background: rgba(20,20,20,.85); backdrop-filter: blur(16px);
    border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,.4); width: 320px; border: 1px solid rgba(255,215,0,.15); }
  #login-box h1 { font-size: 1.5rem; margin-bottom: .15rem; color: #ffd700; font-weight: 700; letter-spacing: .02em; }
  #login-box .subtitle { font-size: .7rem; color: rgba(255,255,255,.35); margin-bottom: 1.4rem; letter-spacing: .15em; text-transform: uppercase; }
  #login-box input { width: 100%; padding: .7rem .8rem; border: 1px solid rgba(255,255,255,.15); border-radius: 8px;
    font-size: .95rem; text-align: center; background: rgba(255,255,255,.08); color: #fff;
    transition: border-color .2s; }
  #login-box input::placeholder { color: rgba(255,255,255,.3); }
  #login-box input:focus { outline: none; border-color: rgba(255,215,0,.5); }
  #login-box button { margin-top: .8rem; width: 100%; padding: .7rem; border: none; border-radius: 8px;
    background: linear-gradient(135deg, #2d5a27, #3a7a32); color: #fff; font-size: .9rem;
    font-weight: 600; cursor: pointer; transition: transform .1s, box-shadow .2s; }
  #login-box button:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(45,90,39,.4); }
  #login-box button:active { transform: translateY(0); }
  #login-error { color: #e74c3c; font-size: .8rem; margin-top: .5rem; display: none; }

  /* ===== App ===== */
  #app { display: none; max-width: 820px; margin: 0 auto; animation: fadeIn .4s ease;
    padding: calc(1.5rem + env(safe-area-inset-top)) calc(1rem + env(safe-area-inset-right)) calc(3rem + env(safe-area-inset-bottom)) calc(1rem + env(safe-area-inset-left));
    width: 100%; overflow: hidden; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; }
  header h1 { font-size: 1.4rem; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,.5); font-weight: 700; }
  header .badge { font-size: .65rem; font-weight: 600; background: rgba(255,215,0,.15); padding: .25rem .7rem;
    border-radius: 99px; color: #ffd700; border: 1px solid rgba(255,215,0,.2); letter-spacing: .04em; text-transform: uppercase; }

  /* ===== Proposed Date Banner ===== */
  .proposed-banner { display: none; margin-bottom: 1.2rem; padding: .9rem 1rem; border-radius: 12px;
    background: linear-gradient(135deg, rgba(255,215,0,.12), rgba(58,122,50,.12));
    border: 1px solid rgba(255,215,0,.3); cursor: pointer;
    transition: transform .15s, box-shadow .15s; animation: fadeIn .4s ease; }
  .proposed-banner.visible { display: block; }
  .proposed-banner:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.2); }
  .proposed-banner:active { transform: translateY(0); }
  .proposed-banner-label { font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .12em;
    color: #ffd700; margin-bottom: .3rem; }
  .proposed-banner-date { font-size: 1.05rem; font-weight: 700; color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,.4); }
  .proposed-banner-status { font-size: .78rem; color: rgba(255,255,255,.65); margin-top: .15rem; }
  .proposed-banner-status strong { color: rgba(255,255,255,.9); font-weight: 600; }
  .proposed-banner .clear-proposed { float: right; background: none; border: 1px solid rgba(255,255,255,.2);
    color: rgba(255,255,255,.5); font-size: .65rem; padding: .2rem .5rem; border-radius: 6px;
    cursor: pointer; transition: all .15s; margin-top: .1rem; }
  .proposed-banner .clear-proposed:hover { border-color: rgba(255,255,255,.4); color: rgba(255,255,255,.8); }

  /* Highlight proposed date cell */
  .cal-cell.proposed-cell { border: 2px solid #ffd700;
    box-shadow: 0 0 12px rgba(255,215,0,.2), inset 0 0 8px rgba(255,215,0,.05); }
  .cal-cell.proposed-cell .day-num { color: #b8860b; font-weight: 800; }

  /* ===== Calendar nav ===== */
  .cal-nav { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 1rem; overflow: hidden; }
  .cal-nav button { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15); border-radius: 8px;
    padding: .4rem .9rem; cursor: pointer; font-size: .95rem; color: #fff; transition: all .15s; }
  .cal-nav button:hover { background: rgba(255,255,255,.2); border-color: rgba(255,255,255,.3); }
  .cal-nav span { font-size: 1.05rem; font-weight: 600; min-width: 180px; text-align: center;
    color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.5); }

  /* ===== Calendar grid ===== */
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; max-width: 100%; overflow: hidden; }
  .cal-header { text-align: center; font-size: .7rem; font-weight: 600; color: rgba(255,255,255,.55);
    padding: .4rem 0; text-transform: uppercase; letter-spacing: .08em; }
  .cal-cell { min-height: 80px; border-radius: 10px; border: 1px solid rgba(255,255,255,.08);
    padding: .35rem; cursor: pointer; position: relative; overflow: hidden;
    background: rgba(255,255,255,.78); backdrop-filter: blur(6px);
    transition: transform .15s, box-shadow .15s, background .15s; }
  .cal-cell:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.15);
    background: rgba(255,255,255,.9); }
  .cal-cell:active { transform: translateY(0); }
  .cal-cell.empty { border: none; cursor: default; background: transparent; backdrop-filter: none; }
  .cal-cell.empty:hover { transform: none; box-shadow: none; }
  .cal-cell .day-num { font-size: .8rem; font-weight: 600; color: #333; }
  .cal-cell .names { font-size: .5rem; color: #666; line-height: 1.3; margin-top: .15rem; max-height: 2.8em; overflow: hidden; }

  /* Progress ring */
  .cal-cell .progress-ring { position: absolute; top: .2rem; right: .25rem; width: 20px; height: 20px; }

  .cal-cell.has-some { background: rgba(255,248,220,.9); border-color: rgba(218,195,80,.35); }
  .cal-cell.has-some:hover { background: rgba(255,248,220,.97); }
  .cal-cell.has-enough { background: rgba(200,235,210,.9); border-color: rgba(100,180,120,.4); }
  .cal-cell.has-enough:hover { background: rgba(200,235,210,.97); }
  .cal-cell.has-full { background: rgba(180,210,255,.9); border-color: rgba(100,140,200,.4); }
  .cal-cell.has-full:hover { background: rgba(180,210,255,.97); }
  .cal-cell .sms-btn { position: absolute; bottom: .2rem; right: .25rem; font-size: .5rem; font-weight: 600;
    background: #2d5a27; color: #fff; border: none; border-radius: 4px; padding: .15rem .4rem;
    cursor: pointer; line-height: 1.2; transition: background .15s; }
  .cal-cell .sms-btn:hover { background: #3a7a32; }
  .cal-cell.past { opacity: .3; pointer-events: none; }

  /* Today ring */
  .cal-cell.today-cell { border: 2px solid #3a7a32; }
  .cal-cell.today-cell .day-num { color: #2d5a27; }

  /* Game night cells */
  .cal-cell.game-night { opacity: 1; pointer-events: auto; cursor: pointer;
    background: rgba(25,35,50,.9); border-color: rgba(255,215,0,.3);
    box-shadow: inset 0 0 20px rgba(255,215,0,.05); }
  .cal-cell.game-night:hover { background: rgba(25,35,50,.95);
    box-shadow: 0 4px 12px rgba(0,0,0,.25), inset 0 0 20px rgba(255,215,0,.08); }
  .cal-cell.game-night .day-num { color: #ffd700; }
  .cal-cell.game-night .names { color: rgba(255,255,255,.6); }
  .cal-cell .trophy { position: absolute; top: .2rem; right: .3rem; font-size: .7rem; }
  .cal-cell.game-night .game-ranks { font-size: .48rem; color: rgba(255,255,255,.7); line-height: 1.35; margin-top: .1rem; }

  /* Blocked date (strikethrough) */
  .cal-cell.blocked { opacity: .35; pointer-events: auto; cursor: pointer;
    background: rgba(180,30,30,.12); border-color: rgba(180,30,30,.2); }
  .cal-cell.blocked:hover { background: rgba(180,30,30,.18); }
  .cal-cell.blocked .day-num { color: #a33; text-decoration: line-through; text-decoration-thickness: 2px; }
  .cal-cell.blocked::after { content: ''; position: absolute; top: 50%; left: 10%; right: 10%;
    height: 2px; background: rgba(180,30,30,.5); transform: rotate(-15deg); pointer-events: none; }

  /* Admin menu trigger */
  .cal-cell .admin-trigger { position: absolute; bottom: .15rem; right: .15rem; width: 20px; height: 20px;
    background: rgba(255,215,0,.9); color: #1a1a1a; border: none; border-radius: 50%;
    cursor: pointer; font-size: .65rem; font-weight: 900; line-height: 20px; text-align: center;
    transition: background .15s, transform .1s; z-index: 2; }
  .cal-cell .admin-trigger:hover { background: rgba(255,215,0,1); transform: scale(1.1); }
  .cal-cell .admin-trigger:active { transform: scale(.95); }

  /* Admin popup menu */
  .admin-menu { display: none; position: fixed; z-index: 150; background: rgba(25,30,35,.95);
    backdrop-filter: blur(12px); border: 1px solid rgba(255,215,0,.25); border-radius: 10px;
    padding: .3rem; min-width: 140px; box-shadow: 0 8px 30px rgba(0,0,0,.4);
    animation: modalSlideIn .15s ease; }
  .admin-menu.open { display: block; }
  .admin-menu button { display: block; width: 100%; text-align: left; padding: .55rem .7rem;
    background: none; border: none; color: #fff; font-size: .78rem; font-weight: 500;
    cursor: pointer; border-radius: 7px; transition: background .12s; font-family: inherit; }
  .admin-menu button:hover { background: rgba(255,255,255,.1); }
  .admin-menu button.danger { color: #e74c3c; }
  .admin-menu button.danger:hover { background: rgba(231,76,60,.12); }

  /* ===== Modal overlay ===== */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(2px);
    animation: fadeIn .15s ease; }
  .overlay.open { display: flex; }
  .modal { background: rgba(255,255,255,.97); backdrop-filter: blur(16px); border-radius: 14px;
    padding: 1.5rem; width: 380px; max-width: 92vw; max-height: 85vh; overflow-y: auto;
    box-shadow: 0 12px 40px rgba(0,0,0,.3); animation: modalSlideIn .2s ease; }
  .modal h2 { font-size: 1.1rem; margin-bottom: .15rem; color: #1a1a1a; font-weight: 700; }
  .modal .date-label { font-size: .82rem; color: #888; margin-bottom: 1rem; }
  .modal label { display: block; font-size: .75rem; font-weight: 600; color: #555;
    margin-bottom: .2rem; margin-top: .8rem; text-transform: uppercase; letter-spacing: .04em; }
  .modal input { width: 100%; padding: .55rem .7rem; border: 1px solid #ddd; border-radius: 8px;
    font-size: .9rem; background: #fff; transition: border-color .15s; }
  .modal input:focus { outline: none; border-color: #3a7a32; box-shadow: 0 0 0 3px rgba(58,122,50,.1); }

  .guest-row { display: flex; gap: .5rem; align-items: center; margin-top: .4rem; }
  .guest-row input { flex: 1; }
  .guest-row .remove-guest { background: none; border: none; color: #c0392b; cursor: pointer;
    font-size: 1.1rem; padding: 0 .3rem; transition: color .15s; }
  .guest-row .remove-guest:hover { color: #e74c3c; }
  #add-guest-btn { margin-top: .5rem; background: none; border: 1px dashed #ccc; border-radius: 8px;
    padding: .4rem .8rem; font-size: .8rem; color: #888; cursor: pointer; width: 100%;
    transition: all .15s; }
  #add-guest-btn:hover { border-color: #3a7a32; color: #3a7a32; }

  .modal-actions { display: flex; gap: .5rem; margin-top: 1.2rem; }
  .modal-actions button { flex: 1; padding: .6rem; border: none; border-radius: 8px;
    font-size: .85rem; font-weight: 600; cursor: pointer; transition: all .15s; }
  .btn-cancel { background: #f0f0f0; color: #555; }
  .btn-cancel:hover { background: #e4e4e4; }
  .btn-save { background: linear-gradient(135deg, #2d5a27, #3a7a32); color: #fff; }
  .btn-save:hover { box-shadow: 0 4px 12px rgba(45,90,39,.3); }
  .btn-danger { background: #c0392b; color: #fff; }
  .btn-danger:hover { background: #e74c3c; }

  /* Status bar in modal */
  .status-bar { margin-top: .6rem; margin-bottom: .2rem; }
  .status-bar-track { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; position: relative; }
  .status-bar-fill { height: 100%; border-radius: 3px; transition: width .3s ease; }
  .status-bar-fill.under { background: linear-gradient(90deg, #d4a017, #e8c840); }
  .status-bar-fill.ready { background: linear-gradient(90deg, #2d5a27, #3a7a32); }
  .status-bar-fill.full { background: linear-gradient(90deg, #2a6db5, #4a90d9); }
  .status-bar-markers { display: flex; justify-content: space-between; margin-top: .2rem; }
  .status-bar-markers span { font-size: .55rem; color: #999; }
  .status-label { font-size: .72rem; margin-top: .3rem; color: #888; text-align: center; }
  .status-label strong { font-weight: 600; }
  .status-label.ready-label { color: #2d5a27; }
  .status-label.full-label { color: #2a6db5; }

  .attendees-list { margin-top: .8rem; border-top: 1px solid #eee; padding-top: .8rem; }
  .attendees-list h3 { font-size: .82rem; color: #555; margin-bottom: .4rem; font-weight: 600; }
  .attendee-item { display: flex; justify-content: space-between; align-items: center; font-size: .82rem;
    padding: .35rem 0; border-bottom: 1px solid #f3f3f3; }
  .attendee-item .name { color: #222; font-weight: 500; }
  .attendee-item .guests { color: #999; font-size: .72rem; }
  .attendee-item .remove-self { background: none; border: none; color: #c0392b; cursor: pointer;
    font-size: .72rem; text-decoration: underline; transition: color .15s; }
  .attendee-item .remove-self:hover { color: #e74c3c; }

  /* Game results display */
  .game-results-display { margin-top: .8rem; padding: 1rem; background: rgba(25,35,50,.04); border-radius: 10px; }
  .game-results-display h3 { font-size: .85rem; color: #2c3e50; margin-bottom: .6rem; font-weight: 600; }
  .podium { display: flex; flex-direction: column; gap: .4rem; }
  .podium-row { display: flex; align-items: center; gap: .5rem; font-size: .9rem; padding: .4rem .6rem;
    border-radius: 8px; transition: transform .15s; }
  .podium-row:hover { transform: translateX(3px); }
  .podium-row.first { background: linear-gradient(90deg, rgba(255,215,0,.12), transparent); }
  .podium-row.second { background: linear-gradient(90deg, rgba(192,192,192,.12), transparent); }
  .podium-row.third { background: linear-gradient(90deg, rgba(205,127,50,.1), transparent); }
  .podium-row.player { background: transparent; padding: .25rem .6rem; font-size: .82rem; }
  .podium-medal { font-size: 1.1rem; }
  .podium-name { color: #333; font-weight: 500; }
  .podium-row.player .podium-name { color: #666; font-weight: 400; }
  .players-divider { font-size: .7rem; color: #aaa; margin: .4rem 0 .2rem; padding-left: .3rem; }

  /* Game edit: players list */
  .player-entry-row { display: flex; gap: .5rem; align-items: center; margin-top: .35rem; }
  .player-entry-row input { flex: 1; }
  .player-entry-row .remove-player { background: none; border: none; color: #c0392b; cursor: pointer;
    font-size: 1.1rem; padding: 0 .3rem; transition: color .15s; }
  .player-entry-row .remove-player:hover { color: #e74c3c; }
  .add-player-btn { margin-top: .5rem; background: none; border: 1px dashed #ccc; border-radius: 8px;
    padding: .35rem .8rem; font-size: .78rem; color: #888; cursor: pointer; width: 100%;
    transition: all .15s; }
  .add-player-btn:hover { border-color: #3a7a32; color: #3a7a32; }

  /* ===== Game History ===== */
  .game-history { margin-top: 1.8rem; max-width: 100%; overflow: hidden; }
  .game-history h2 { font-size: 1rem; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.5);
    margin-bottom: .6rem; font-weight: 700; }
  .history-scroll { display: flex; gap: .6rem; overflow-x: auto; overflow-y: hidden; padding-bottom: .8rem;
    scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; cursor: grab;
    user-select: none; overscroll-behavior-x: contain; }
  .history-scroll.dragging { cursor: grabbing; scroll-snap-type: none; }
  .history-scroll::-webkit-scrollbar { height: 4px; }
  .history-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,.05); border-radius: 2px; }
  .history-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 2px; }
  .history-card { flex: 0 0 auto; width: 175px; scroll-snap-align: start;
    background: rgba(25,35,50,.88); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,215,0,.2); border-radius: 12px; padding: .8rem;
    cursor: pointer; transition: all .2s; }
  .history-card:hover { border-color: rgba(255,215,0,.5); transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,.25); }
  .history-card .hc-date { font-size: .78rem; font-weight: 600; color: #ffd700; margin-bottom: .45rem; }
  .history-card .hc-row { display: flex; align-items: center; gap: .3rem; font-size: .75rem;
    color: rgba(255,255,255,.8); padding: .1rem 0; }
  .history-card .hc-medal { font-size: .8rem; }
  .history-card .hc-players { font-size: .6rem; color: rgba(255,255,255,.4); margin-top: .3rem; }
  .no-games { font-size: .85rem; color: rgba(255,255,255,.4); padding: .5rem 0; }

  /* ===== Leaderboard ===== */
  .leaderboard { margin-top: 1.5rem; overflow: hidden; }
  .leaderboard h2 { font-size: 1rem; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.5);
    margin-bottom: .6rem; font-weight: 700; }
  .lb-container { background: rgba(20,20,20,.75); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,215,0,.15); border-radius: 14px; padding: 1rem; overflow: hidden; }
  .lb-row { display: flex; align-items: center; gap: .6rem; padding: .45rem .4rem;
    border-bottom: 1px solid rgba(255,255,255,.06); transition: background .15s; min-width: 0; }
  .lb-row:last-child { border-bottom: none; }
  .lb-row:hover { background: rgba(255,255,255,.04); }
  .lb-rank { width: 24px; text-align: center; font-size: .85rem; font-weight: 700; color: rgba(255,255,255,.4); }
  .lb-row:nth-child(1) .lb-rank { color: #ffd700; }
  .lb-row:nth-child(2) .lb-rank { color: #c0c0c0; }
  .lb-row:nth-child(3) .lb-rank { color: #cd7f32; }
  .lb-name { flex: 1; font-size: .85rem; color: rgba(255,255,255,.85); font-weight: 500;
    min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-stats { display: flex; gap: .7rem; }
  .lb-stat { text-align: center; }
  .lb-stat-val { font-size: .8rem; font-weight: 700; color: #ffd700; }
  .lb-stat-label { font-size: .5rem; color: rgba(255,255,255,.35); text-transform: uppercase; letter-spacing: .06em; }
  .lb-bar-bg { flex: 0 0 60px; height: 5px; background: rgba(255,255,255,.08); border-radius: 3px; overflow: hidden; }
  .lb-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #ffd700, #2d5a27);
    transition: width .4s ease; }

  /* ===== Toast ===== */
  #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px);
    background: rgba(20,20,20,.9); backdrop-filter: blur(8px); color: #fff; padding: .6rem 1.2rem;
    border-radius: 10px; font-size: .82rem; font-weight: 500; z-index: 300;
    box-shadow: 0 4px 20px rgba(0,0,0,.3); border: 1px solid rgba(255,255,255,.1);
    opacity: 0; transition: all .3s ease; pointer-events: none; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ===== Loading ===== */
  #loading { display: none; position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 200;
    background: linear-gradient(90deg, #2d5a27, #ffd700, #2d5a27); background-size: 200% 100%;
    animation: loadSlide 1.2s linear infinite; }
  @keyframes loadSlide { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* ===== Animations ===== */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes modalSlideIn { from { opacity: 0; transform: translateY(12px) scale(.97); }
    to { opacity: 1; transform: translateY(0) scale(1); } }

  /* ===== Responsive ===== */
  @media (max-width: 600px) {
    .cal-cell { min-height: 60px; padding: .25rem; border-radius: 6px; }
    .cal-cell .day-num { font-size: .7rem; }
    .cal-cell .names { display: none; }
    .cal-cell .game-ranks { font-size: .42rem; }
    .cal-cell .sms-btn { font-size: .45rem; }
    .cal-cell .admin-trigger { width: 17px; height: 17px; font-size: .55rem; line-height: 17px; }
    .cal-cell .trophy { font-size: .55rem; }
    .cal-cell .progress-ring { width: 16px; height: 16px; }
    .cal-header { font-size: .6rem; }
    .cal-grid { gap: 3px; }
    header h1 { font-size: 1.2rem; }
    .history-card { width: 155px; padding: .65rem; }
    .lb-bar-bg { display: none; }
  }
</style>
</head>
<body>

<div id="loading"></div>
<div id="toast"></div>

<!-- Login Screen -->
<div id="login-screen">
  <div id="login-box">
    <h1>Poker Night</h1>
    <div class="subtitle">Enter password to continue</div>
    <input type="password" id="pw-input" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" autocomplete="off">
    <button onclick="tryLogin()">Deal Me In</button>
    <div id="login-error">Wrong password</div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <h1>Poker Night</h1>
    <span class="badge" id="role-badge"></span>
  </header>

  <div class="proposed-banner" id="proposed-banner" onclick="goToProposedDate()">
    <div class="proposed-banner-label">Proposed Game Night</div>
    <div class="proposed-banner-date" id="proposed-date-text"></div>
    <div class="proposed-banner-status" id="proposed-status-text"></div>
  </div>

  <div class="cal-nav">
    <button onclick="changeMonth(-1)">&larr;</button>
    <span id="month-label"></span>
    <button onclick="changeMonth(1)">&rarr;</button>
  </div>

  <div class="cal-grid" id="cal-grid"></div>

  <div class="game-history" id="game-history-section" style="display:none">
    <h2>Game History</h2>
    <div class="history-scroll" id="history-scroll"></div>
  </div>

  <div class="leaderboard" id="leaderboard-section" style="display:none">
    <h2>Leaderboard</h2>
    <div class="lb-container" id="leaderboard"></div>
  </div>
</div>

<!-- Date Modal (availability) -->
<div class="overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modal-title">Add Availability</h2>
    <div class="date-label" id="modal-date"></div>

    <div id="status-section"></div>

    <div class="attendees-list" id="attendees-section">
      <h3 id="attendees-header">Who's In</h3>
      <div id="attendees-list"></div>
    </div>

    <div id="add-form">
      <label>Your Name</label>
      <input type="text" id="input-name" placeholder="e.g. Mike">
      <label>Phone or Email</label>
      <input type="text" id="input-contact" placeholder="(555) 123-4567 or email" autocomplete="off" autocapitalize="off">

      <label>Additional Guests</label>
      <div id="guests-container"></div>
      <button id="add-guest-btn" onclick="addGuestRow()">+ Add a guest</button>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveEntry()">I'm In</button>
      </div>
    </div>
  </div>
</div>

<!-- Game Night Modal -->
<div class="overlay" id="game-modal-overlay" onclick="if(event.target===this)closeGameModal()">
  <div class="modal">
    <h2 id="game-modal-title">Game Night Results</h2>
    <div class="date-label" id="game-modal-date"></div>

    <div id="game-view" style="display:none">
      <div class="game-results-display">
        <h3>Final Standings</h3>
        <div class="podium" id="game-podium"></div>
      </div>
      <div id="game-admin-actions" style="display:none; margin-top: 1rem;">
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeGameModal()">Close</button>
          <button class="btn-save" onclick="editGameResults()">Edit</button>
          <button class="btn-danger" onclick="deleteGameNight()">Delete</button>
        </div>
      </div>
      <div id="game-nonadmin-close" style="display:none; margin-top: 1rem;">
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeGameModal()">Close</button>
        </div>
      </div>
    </div>

    <div id="game-edit" style="display:none">
      <label>1st Place</label>
      <input type="text" id="game-1st" placeholder="Winner's name">
      <label>2nd Place</label>
      <input type="text" id="game-2nd" placeholder="Runner-up">
      <label>3rd Place</label>
      <input type="text" id="game-3rd" placeholder="Third place">

      <label>Other Players</label>
      <div id="game-players-container"></div>
      <button class="add-player-btn" onclick="addPlayerRow()">+ Add player</button>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeGameModal()">Cancel</button>
        <button class="btn-save" onclick="saveGameResults()">Save Results</button>
      </div>
    </div>
  </div>
</div>

<!-- Admin Menu Popup -->
<div class="admin-menu" id="admin-menu"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
  // --- Firebase Setup ---
  const firebaseConfig = {
    apiKey: "AIzaSyDhg3nbIsCtap6D3HM-_jbu96WjW-gV9zM",
    authDomain: "poker-night-ca544.firebaseapp.com",
    databaseURL: "https://poker-night-ca544-default-rtdb.firebaseio.com",
    projectId: "poker-night-ca544",
    storageBucket: "poker-night-ca544.firebasestorage.app",
    messagingSenderId: "430601209718",
    appId: "1:430601209718:web:5c269b0f90a4fb02e11c57"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const datesRef = db.ref('dates');
  const gamesRef = db.ref('games');
  const blockedRef = db.ref('blocked');
  const proposedRef = db.ref('proposedDate');

  const MIN_PLAYERS = 6;
  const MAX_PLAYERS = 10;
  let isAdmin = false;
  let currentYear, currentMonth;
  let selectedDate = null;
  let guestCount = 0;
  let allData = {};
  let allGames = {};
  let allBlocked = {};
  let proposedDate = null;

  function showLoading() { document.getElementById('loading').style.display = 'block'; }
  function hideLoading() { document.getElementById('loading').style.display = 'none'; }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // --- Contact (phone or email) formatting ---
  function isEmail(val) { return val.includes('@'); }
  function formatPhone(val) {
    const digits = val.replace(/\D/g, '').slice(0, 10);
    if (digits.length === 0) return '';
    if (digits.length <= 3) return `(${digits}`;
    if (digits.length <= 6) return `(${digits.slice(0,3)}) ${digits.slice(3)}`;
    return `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`;
  }
  function getRawContact(val) {
    if (isEmail(val)) return val.trim().toLowerCase();
    return val.replace(/\D/g, '');
  }
  function isValidContact(val) {
    if (isEmail(val)) return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val.trim());
    return val.replace(/\D/g, '').length >= 10;
  }
  document.addEventListener('input', e => {
    if (e.target.id === 'input-contact') {
      // Only auto-format if it looks like a phone number (no @ sign)
      if (!isEmail(e.target.value)) {
        const pos = e.target.selectionStart;
        const before = e.target.value.length;
        e.target.value = formatPhone(e.target.value);
        const after = e.target.value.length;
        const newPos = pos + (after - before);
        e.target.setSelectionRange(newPos, newPos);
      }
    }
  });

  // --- Real-time listeners ---
  datesRef.on('value', snap => {
    allData = snap.val() || {};
    renderCalendar();
    renderProposedBanner();
    if (selectedDate && document.getElementById('modal-overlay').classList.contains('open')) renderAttendees();
    hideLoading();
  });
  gamesRef.on('value', snap => {
    allGames = snap.val() || {};
    renderCalendar();
    renderGameHistory();
    renderLeaderboard();
    hideLoading();
  });
  blockedRef.on('value', snap => {
    allBlocked = snap.val() || {};
    renderCalendar();
    hideLoading();
  });
  proposedRef.on('value', snap => {
    proposedDate = snap.val() || null;
    renderCalendar();
    renderProposedBanner();
    hideLoading();
  });

  function totalPeople(entries) {
    let n = 0;
    (entries || []).forEach(e => { n += 1 + (e.guests ? e.guests.length : 0); });
    return n;
  }

  const MONTHS_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const MEDAL_EMOJI = ['\u{1F947}', '\u{1F948}', '\u{1F949}'];

  function niceDate(dateStr) {
    const [y,m,d] = dateStr.split('-');
    return `${MONTHS_SHORT[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
  }

  // --- SVG progress ring ---
  function progressRingSvg(count, min, max) {
    // Ring fills to min first (yellow/green), then continues to max (blue)
    let pct, color;
    if (count >= max) {
      pct = 1; color = '#2a6db5';
    } else if (count >= min) {
      pct = 1; color = '#2d5a27';
    } else {
      pct = count / min; color = '#d4a017';
    }
    const r = 7, cx = 10, cy = 10, stroke = 2.5;
    const circ = 2 * Math.PI * r;
    const offset = circ * (1 - pct);
    return `<svg class="progress-ring" viewBox="0 0 20 20">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(0,0,0,.08)" stroke-width="${stroke}"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
        stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
        transform="rotate(-90 ${cx} ${cy})" style="transition: stroke-dashoffset .4s ease"/>
      <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central"
        font-size="6" font-weight="700" fill="${count >= min ? (count >= max ? '#2a6db5' : '#2d5a27') : '#888'}">${count}</text>
    </svg>`;
  }

  // --- Login ---
  document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
  function tryLogin() {
    const pw = document.getElementById('pw-input').value.trim().toLowerCase();
    if (pw === 'rininger') { isAdmin = true; enterApp(); }
    else if (pw === 'pepper') { isAdmin = false; enterApp(); }
    else {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('pw-input').value = '';
      const box = document.getElementById('login-box');
      box.style.animation = 'none'; box.offsetHeight;
      box.style.animation = 'shake .4s ease';
    }
  }
  function enterApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('role-badge').textContent = isAdmin ? 'Admin' : 'Player';
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth();
    renderCalendar();
    renderGameHistory();
    renderLeaderboard();
    renderProposedBanner();
  }

  // --- Calendar ---
  function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    renderCalendar();
  }

  function renderCalendar() {
    const grid = document.getElementById('cal-grid');
    if (!grid) return;
    document.getElementById('month-label').textContent = `${MONTHS_LONG[currentMonth]} ${currentYear}`;

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const today = new Date(); today.setHours(0,0,0,0);
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    let html = days.map(d => `<div class="cal-header">${d}</div>`).join('');

    for (let i = 0; i < firstDay; i++) html += '<div class="cal-cell empty"></div>';

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cellDate = new Date(currentYear, currentMonth, d);
      const isPast = cellDate < today;
      const isToday = cellDate.getTime() === today.getTime();
      const isPastOrToday = isPast || isToday;
      const hasGame = !!allGames[dateStr];
      const isBlocked = !!allBlocked[dateStr];
      const entries = allData[dateStr] ? Object.values(allData[dateStr]) : [];
      const total = totalPeople(entries);

      let cls = 'cal-cell';
      if (isBlocked) {
        cls += ' blocked';
      } else if (hasGame) {
        cls += ' game-night';
      } else if (isPast) {
        cls += ' past';
      } else if (total >= MAX_PLAYERS) {
        cls += ' has-full';
      } else if (total >= MIN_PLAYERS) {
        cls += ' has-enough';
      } else if (total > 0) {
        cls += ' has-some';
      }
      if (isToday && !hasGame && !isBlocked) cls += ' today-cell';
      if (proposedDate === dateStr && !hasGame && !isBlocked) cls += ' proposed-cell';

      let clickAction = '';
      if (isBlocked) {
        if (isAdmin) clickAction = `unblockDate('${dateStr}')`;
      } else if (hasGame) {
        clickAction = `openGameModal('${dateStr}')`;
      } else if (!isPast) {
        clickAction = `openModal('${dateStr}')`;
      }

      let trophyHtml = hasGame ? '<div class="trophy">\u{1F3C6}</div>' : '';

      let gameRanksHtml = '';
      if (hasGame) {
        const g = allGames[dateStr];
        const ranks = [g.first, g.second, g.third].filter(Boolean);
        gameRanksHtml = `<div class="game-ranks">${ranks.map((n,i) => `${MEDAL_EMOJI[i]} ${esc(n)}`).join('<br>')}</div>`;
      }

      let namesHtml = '';
      if (!hasGame && !isBlocked && isAdmin && entries.length > 0) {
        const nameList = entries.map(e => esc(e.name)).join(', ');
        namesHtml = `<div class="names">${nameList}</div>`;
      }

      let ringHtml = '';
      if (!hasGame && !isBlocked && !isPast && total > 0) {
        ringHtml = progressRingSvg(total, MIN_PLAYERS, MAX_PLAYERS);
      }

      // Send Message: admin only, enough players, NOT today, NOT past
      let smsBtn = '';
      if (!hasGame && !isBlocked && isAdmin && total >= MIN_PLAYERS && !isPastOrToday) {
        smsBtn = `<button class="sms-btn" onclick="event.stopPropagation();sendGroupText('${dateStr}')">Send Message</button>`;
      }

      // Admin menu trigger: show on non-past admin cells (or past+admin for log game)
      let adminBtn = '';
      if (isAdmin && !isBlocked && !hasGame) {
        const menuItems = [];
        if (isPastOrToday) menuItems.push('log');
        if (!isPast) {
          menuItems.push('propose');
          menuItems.push('block');
        }
        if (menuItems.length) {
          adminBtn = `<button class="admin-trigger" onclick="event.stopPropagation();openAdminMenu(event,'${dateStr}','${menuItems.join(',')}')">&#8943;</button>`;
        }
      }

      let cellStyle = '';
      if (!hasGame && !isBlocked && isAdmin && isPast) {
        cellStyle = 'style="opacity:.5;pointer-events:auto;cursor:default;"';
      }

      html += `<div class="${cls}" ${cellStyle} onclick="${clickAction}">
        <div class="day-num">${d}</div>
        ${trophyHtml}
        ${ringHtml}
        ${hasGame ? gameRanksHtml : namesHtml}
        ${smsBtn}
        ${adminBtn}
      </div>`;
    }
    grid.innerHTML = html;
  }

  // --- Availability Modal ---
  function openModal(dateStr) {
    selectedDate = dateStr;
    guestCount = 0;
    document.getElementById('modal-date').textContent = niceDate(dateStr);
    document.getElementById('input-name').value = '';
    document.getElementById('input-contact').value = '';
    document.getElementById('guests-container').innerHTML = '';
    renderAttendees();
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('input-name').focus(), 100);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    selectedDate = null;
  }

  function renderAttendees() {
    const entries = allData[selectedDate] ? Object.entries(allData[selectedDate]) : [];
    const total = totalPeople(entries.map(([,v]) => v));

    // Status bar
    const statusEl = document.getElementById('status-section');
    const pct = Math.min((total / MAX_PLAYERS) * 100, 100);
    let fillCls = 'under', labelCls = '', labelText = '';
    if (total >= MAX_PLAYERS) {
      fillCls = 'full'; labelCls = 'full-label';
      labelText = `<strong>${total} players</strong> — Table is full!`;
    } else if (total >= MIN_PLAYERS) {
      fillCls = 'ready'; labelCls = 'ready-label';
      labelText = `<strong>${total} players</strong> — Game on! Room for ${MAX_PLAYERS - total} more`;
    } else {
      labelText = `<strong>${total}</strong> of <strong>${MIN_PLAYERS}</strong> minimum players`;
    }
    statusEl.innerHTML = `<div class="status-bar">
      <div class="status-bar-track">
        <div class="status-bar-fill ${fillCls}" style="width:${pct}%"></div>
      </div>
      <div class="status-bar-markers">
        <span>0</span><span>${MIN_PLAYERS} min</span><span>${MAX_PLAYERS} max</span>
      </div>
      <div class="status-label ${labelCls}">${labelText}</div>
    </div>`;

    // Header
    document.getElementById('attendees-header').textContent = `Who's In (${total} player${total !== 1 ? 's' : ''})`;

    let html = '';
    entries.forEach(([key, e]) => {
      let guestNames = (e.guests || []).map(g => g.name).join(', ');
      const removeBtn = isAdmin
        ? `<button class="remove-self" onclick="removeEntry('${selectedDate}','${key}')">remove</button>`
        : '';
      html += `<div class="attendee-item">
        <div>
          <span class="name">${esc(e.name)}</span>
          ${guestNames ? `<span class="guests"> +${e.guests.length} (${esc(guestNames)})</span>` : ''}
        </div>
        ${removeBtn}
      </div>`;
    });
    if (!entries.length) html = '<div style="font-size:.8rem;color:#aaa;padding:.3rem 0">No one yet — be the first!</div>';
    document.getElementById('attendees-list').innerHTML = html;
  }

  function addGuestRow() {
    guestCount++;
    const container = document.getElementById('guests-container');
    const div = document.createElement('div');
    div.className = 'guest-row';
    div.innerHTML = `<input type="text" placeholder="Guest name or nickname" class="guest-name">
      <button class="remove-guest" onclick="this.parentElement.remove()">&times;</button>`;
    container.appendChild(div);
    div.querySelector('input').focus();
  }

  function saveEntry() {
    const name = document.getElementById('input-name').value.trim();
    const contactVal = document.getElementById('input-contact').value;
    const contact = getRawContact(contactVal);
    if (!name) { document.getElementById('input-name').style.borderColor = '#e74c3c'; return; }
    if (!isValidContact(contactVal)) { document.getElementById('input-contact').style.borderColor = '#e74c3c'; return; }

    const guestInputs = document.querySelectorAll('#guests-container .guest-name');
    const guests = [];
    let guestError = false;
    guestInputs.forEach(inp => {
      const gn = inp.value.trim();
      if (!gn) { inp.style.borderColor = '#e74c3c'; guestError = true; }
      else guests.push({ name: gn });
    });
    if (guestError) return;

    showLoading();
    const newRef = db.ref('dates/' + selectedDate).push();
    // Store as 'contact' but also keep 'phone' for backward compatibility
    const data = { name, contact, guests };
    if (!isEmail(contactVal)) data.phone = contact;
    newRef.set(data).then(() => {
      document.getElementById('input-name').value = '';
      document.getElementById('input-contact').value = '';
      document.getElementById('guests-container').innerHTML = '';
      guestCount = 0;
      closeModal();
      showToast(`${name} is in!`);
    });
  }

  function removeEntry(dateStr, key) {
    showLoading();
    db.ref('dates/' + dateStr + '/' + key).remove().then(() => {
      showToast('Entry removed');
    });
  }

  // --- Game Night Modal ---
  let gameModalDate = null;

  function openGameModal(dateStr) {
    gameModalDate = dateStr;
    document.getElementById('game-modal-date').textContent = niceDate(dateStr);

    const existing = allGames[dateStr];
    if (existing) {
      document.getElementById('game-modal-title').textContent = 'Game Night Results';
      document.getElementById('game-view').style.display = 'block';
      document.getElementById('game-edit').style.display = 'none';
      document.getElementById('game-admin-actions').style.display = isAdmin ? 'block' : 'none';
      document.getElementById('game-nonadmin-close').style.display = isAdmin ? 'none' : 'block';

      let podiumHtml = '';
      const places = [
        { name: existing.first, cls: 'first', medal: MEDAL_EMOJI[0] },
        { name: existing.second, cls: 'second', medal: MEDAL_EMOJI[1] },
        { name: existing.third, cls: 'third', medal: MEDAL_EMOJI[2] }
      ];
      places.forEach(p => {
        if (p.name) {
          podiumHtml += `<div class="podium-row ${p.cls}">
            <span class="podium-medal">${p.medal}</span>
            <span class="podium-name">${esc(p.name)}</span>
          </div>`;
        }
      });
      // Show other players
      const others = existing.players || [];
      if (others.length) {
        podiumHtml += '<div class="players-divider">Also played</div>';
        others.forEach(name => {
          podiumHtml += `<div class="podium-row player">
            <span class="podium-medal" style="font-size:.8rem">&#9824;</span>
            <span class="podium-name">${esc(name)}</span>
          </div>`;
        });
      }
      document.getElementById('game-podium').innerHTML = podiumHtml;
    } else {
      document.getElementById('game-modal-title').textContent = 'Log Game Night';
      document.getElementById('game-view').style.display = 'none';
      document.getElementById('game-edit').style.display = 'block';
      document.getElementById('game-1st').value = '';
      document.getElementById('game-2nd').value = '';
      document.getElementById('game-3rd').value = '';
      document.getElementById('game-players-container').innerHTML = '';
      setTimeout(() => document.getElementById('game-1st').focus(), 100);
    }

    document.getElementById('game-modal-overlay').classList.add('open');
  }

  function closeGameModal() {
    document.getElementById('game-modal-overlay').classList.remove('open');
    gameModalDate = null;
  }

  function addPlayerRow() {
    const container = document.getElementById('game-players-container');
    const div = document.createElement('div');
    div.className = 'player-entry-row';
    div.innerHTML = `<input type="text" placeholder="Player name" class="game-player-name">
      <button class="remove-player" onclick="this.parentElement.remove()">&times;</button>`;
    container.appendChild(div);
    div.querySelector('input').focus();
  }

  function editGameResults() {
    const g = allGames[gameModalDate];
    document.getElementById('game-view').style.display = 'none';
    document.getElementById('game-edit').style.display = 'block';
    document.getElementById('game-modal-title').textContent = 'Edit Game Night';
    document.getElementById('game-1st').value = g ? g.first || '' : '';
    document.getElementById('game-2nd').value = g ? g.second || '' : '';
    document.getElementById('game-3rd').value = g ? g.third || '' : '';

    const container = document.getElementById('game-players-container');
    container.innerHTML = '';
    if (g && g.players) {
      g.players.forEach(name => {
        const div = document.createElement('div');
        div.className = 'player-entry-row';
        div.innerHTML = `<input type="text" placeholder="Player name" class="game-player-name" value="${esc(name)}">
          <button class="remove-player" onclick="this.parentElement.remove()">&times;</button>`;
        container.appendChild(div);
      });
    }
    setTimeout(() => document.getElementById('game-1st').focus(), 100);
  }

  function saveGameResults() {
    const first = document.getElementById('game-1st').value.trim();
    const second = document.getElementById('game-2nd').value.trim();
    const third = document.getElementById('game-3rd').value.trim();
    if (!first) { document.getElementById('game-1st').style.borderColor = '#e74c3c'; return; }

    const playerInputs = document.querySelectorAll('#game-players-container .game-player-name');
    const players = [];
    let playerError = false;
    playerInputs.forEach(inp => {
      const n = inp.value.trim();
      if (!n) { inp.style.borderColor = '#e74c3c'; playerError = true; }
      else players.push(n);
    });
    if (playerError) return;

    showLoading();
    const data = { first, second, third };
    if (players.length) data.players = players;
    db.ref('games/' + gameModalDate).set(data).then(() => {
      closeGameModal();
      showToast('Game night saved!');
    });
  }

  function deleteGameNight() {
    if (!confirm('Remove this game night? This cannot be undone.')) return;
    showLoading();
    db.ref('games/' + gameModalDate).remove().then(() => {
      closeGameModal();
      showToast('Game night removed');
    });
  }

  // --- Game History ---
  function renderGameHistory() {
    const container = document.getElementById('history-scroll');
    const section = document.getElementById('game-history-section');
    if (!container || !section) return;

    const gameDates = Object.keys(allGames).sort().reverse();
    if (!gameDates.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';

    let html = '';
    gameDates.forEach(dateStr => {
      const g = allGames[dateStr];
      const playerCount = 3 + (g.players ? g.players.length : 0) - (g.second ? 0 : 1) - (g.third ? 0 : 1);
      html += `<div class="history-card" onclick="openGameModal('${dateStr}')">
        <div class="hc-date">${niceDate(dateStr)}</div>
        ${g.first ? `<div class="hc-row"><span class="hc-medal">${MEDAL_EMOJI[0]}</span> ${esc(g.first)}</div>` : ''}
        ${g.second ? `<div class="hc-row"><span class="hc-medal">${MEDAL_EMOJI[1]}</span> ${esc(g.second)}</div>` : ''}
        ${g.third ? `<div class="hc-row"><span class="hc-medal">${MEDAL_EMOJI[2]}</span> ${esc(g.third)}</div>` : ''}
        ${playerCount > 0 ? `<div class="hc-players">${playerCount} player${playerCount !== 1 ? 's' : ''} total</div>` : ''}
      </div>`;
    });
    container.innerHTML = html;
  }

  // Drag-to-scroll
  (function() {
    const el = document.getElementById('history-scroll');
    let isDown = false, startX, scrollLeft, moved;
    el.addEventListener('mousedown', e => {
      isDown = true; moved = false;
      el.classList.add('dragging');
      startX = e.pageX - el.offsetLeft;
      scrollLeft = el.scrollLeft;
    });
    el.addEventListener('mouseleave', () => { isDown = false; el.classList.remove('dragging'); });
    el.addEventListener('mouseup', () => { isDown = false; el.classList.remove('dragging'); });
    el.addEventListener('mousemove', e => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - el.offsetLeft;
      const walk = (x - startX) * 1.5;
      if (Math.abs(walk) > 3) moved = true;
      el.scrollLeft = scrollLeft - walk;
    });
    el.addEventListener('click', e => { if (moved) { e.stopPropagation(); e.preventDefault(); } }, true);
  })();

  // --- Leaderboard ---
  function renderLeaderboard() {
    const container = document.getElementById('leaderboard');
    const section = document.getElementById('leaderboard-section');
    if (!container || !section) return;

    const gameDates = Object.keys(allGames);
    if (!gameDates.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';

    // Points: 1st=3, 2nd=2, 3rd=1, played=1
    const scores = {};
    const wins = {};
    const played = {};
    gameDates.forEach(dateStr => {
      const g = allGames[dateStr];
      if (g.first) {
        const n = g.first.trim();
        scores[n] = (scores[n] || 0) + 3 + 1; // placement + participation
        wins[n] = (wins[n] || 0) + 1;
        played[n] = (played[n] || 0) + 1;
      }
      if (g.second) {
        const n = g.second.trim();
        scores[n] = (scores[n] || 0) + 2 + 1;
        played[n] = (played[n] || 0) + 1;
      }
      if (g.third) {
        const n = g.third.trim();
        scores[n] = (scores[n] || 0) + 1 + 1;
        played[n] = (played[n] || 0) + 1;
      }
      if (g.players) {
        g.players.forEach(name => {
          const n = name.trim();
          scores[n] = (scores[n] || 0) + 1; // participation only
          played[n] = (played[n] || 0) + 1;
        });
      }
    });

    const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
    const maxPts = sorted.length ? sorted[0][1] : 1;

    let html = '';
    sorted.forEach(([name, pts], i) => {
      const w = wins[name] || 0;
      const gp = played[name] || 0;
      const pct = Math.round((pts / maxPts) * 100);
      const rankDisplay = i < 3 ? MEDAL_EMOJI[i] : (i + 1);
      html += `<div class="lb-row">
        <div class="lb-rank">${rankDisplay}</div>
        <div class="lb-name">${esc(name)}</div>
        <div class="lb-stats">
          <div class="lb-stat"><div class="lb-stat-val">${gp}</div><div class="lb-stat-label">Played</div></div>
          <div class="lb-stat"><div class="lb-stat-val">${w}</div><div class="lb-stat-label">Wins</div></div>
          <div class="lb-stat"><div class="lb-stat-val">${pts}</div><div class="lb-stat-label">Pts</div></div>
        </div>
        <div class="lb-bar-bg"><div class="lb-bar" style="width:${pct}%"></div></div>
      </div>`;
    });
    container.innerHTML = html;
  }

  // --- Admin Menu ---
  function openAdminMenu(event, dateStr, itemsStr) {
    event.stopPropagation();
    const menu = document.getElementById('admin-menu');
    const items = itemsStr.split(',');
    let html = '';
    if (items.includes('log')) {
      html += `<button onclick="closeAdminMenu();openGameModal('${dateStr}')">Log Game Night</button>`;
    }
    if (items.includes('propose')) {
      const isCurrentlyProposed = proposedDate === dateStr;
      if (isCurrentlyProposed) {
        html += `<button onclick="closeAdminMenu();clearProposedDate()">Remove Proposal</button>`;
      } else {
        html += `<button onclick="closeAdminMenu();proposeDate('${dateStr}')">Propose Date</button>`;
      }
    }
    if (items.includes('block')) {
      html += `<button class="danger" onclick="closeAdminMenu();blockDate('${dateStr}')">Block Date</button>`;
    }
    menu.innerHTML = html;

    // Position near the button
    const rect = event.target.getBoundingClientRect();
    let top = rect.bottom + 4;
    let left = rect.left - 100;
    // Keep on screen
    if (left < 8) left = 8;
    if (left + 150 > window.innerWidth) left = window.innerWidth - 158;
    if (top + 100 > window.innerHeight) top = rect.top - 80;
    menu.style.top = top + 'px';
    menu.style.left = left + 'px';
    menu.classList.add('open');

    // Close on next click anywhere
    setTimeout(() => {
      document.addEventListener('click', closeAdminMenu, { once: true });
    }, 10);
  }
  function closeAdminMenu() {
    document.getElementById('admin-menu').classList.remove('open');
  }

  // --- Proposed Date ---
  function proposeDate(dateStr) {
    showLoading();
    proposedRef.set(dateStr).then(() => {
      showToast('Date proposed!');
    });
  }
  function clearProposedDate() {
    showLoading();
    proposedRef.remove().then(() => {
      showToast('Proposal cleared');
    });
  }
  function renderProposedBanner() {
    const banner = document.getElementById('proposed-banner');
    if (!banner) return;
    if (!proposedDate) {
      banner.classList.remove('visible');
      return;
    }
    // Check if proposed date is blocked or has a game or is in the past
    const today = new Date(); today.setHours(0,0,0,0);
    const [y,m,d] = proposedDate.split('-').map(Number);
    const pDate = new Date(y, m - 1, d);
    if (pDate < today || allBlocked[proposedDate] || allGames[proposedDate]) {
      // Auto-clear stale proposals
      if (isAdmin) proposedRef.remove();
      banner.classList.remove('visible');
      return;
    }
    banner.classList.add('visible');
    // Format: "Friday, March 20, 2026"
    const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    document.getElementById('proposed-date-text').textContent =
      `${dayNames[pDate.getDay()]}, ${MONTHS_LONG[m-1]} ${d}, ${y}`;
    // Show player count
    const entries = allData[proposedDate] ? Object.values(allData[proposedDate]) : [];
    const total = totalPeople(entries);
    let statusText = '';
    if (total >= MAX_PLAYERS) {
      statusText = `<strong>${total} players</strong> — Table is full!`;
    } else if (total >= MIN_PLAYERS) {
      statusText = `<strong>${total} players</strong> signed up — Game on!`;
    } else if (total > 0) {
      statusText = `<strong>${total}</strong> of <strong>${MIN_PLAYERS}</strong> needed — Tap to sign up`;
    } else {
      statusText = 'No one signed up yet — Tap to be the first!';
    }
    const clearBtn = isAdmin ? `<button class="clear-proposed" onclick="event.stopPropagation();clearProposedDate()">Clear</button>` : '';
    document.getElementById('proposed-status-text').innerHTML = statusText + clearBtn;
  }
  function goToProposedDate() {
    if (!proposedDate) return;
    const [y,m] = proposedDate.split('-').map(Number);
    currentYear = y;
    currentMonth = m - 1;
    renderCalendar();
    // Open the modal for that date
    setTimeout(() => openModal(proposedDate), 200);
  }

  // --- Block/Unblock Date ---
  function blockDate(dateStr) {
    if (!confirm(`Block ${niceDate(dateStr)}? All availability entries will be removed.`)) return;
    showLoading();
    // Remove all entries for that date and mark as blocked
    db.ref('dates/' + dateStr).remove().then(() => {
      return db.ref('blocked/' + dateStr).set(true);
    }).then(() => {
      showToast('Date blocked');
    });
  }
  function unblockDate(dateStr) {
    if (!confirm(`Unblock ${niceDate(dateStr)}?`)) return;
    showLoading();
    db.ref('blocked/' + dateStr).remove().then(() => {
      showToast('Date unblocked');
    });
  }

  // --- Group Message ---
  function sendGroupText(dateStr) {
    const entries = allData[dateStr] ? Object.values(allData[dateStr]) : [];
    const recipients = [];
    entries.forEach(e => {
      // Use contact field first, fall back to phone for older entries
      const addr = e.contact || e.phone;
      if (addr) recipients.push(addr);
    });
    if (!recipients.length) return;

    const body = encodeURIComponent(`Poker Night is ON for ${niceDate(dateStr)}! See you there.`);
    const sep = /iPhone|iPad|iPod/i.test(navigator.userAgent) ? '&' : '?';
    const uri = `sms:${recipients.join(',')}${sep}body=${body}`;
    window.open(uri, '_self');
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  const shakeStyle = document.createElement('style');
  shakeStyle.textContent = `@keyframes shake {
    0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-6px); }
    40%,80% { transform: translateX(6px); } }`;
  document.head.appendChild(shakeStyle);
</script>
</body>
